# We first read the local configuration which must include:
# - data_path: the local path to all needed datasets
# - ftp (optional): the FTP login details for upload at the end of a workflow

local_config_path: 'local-config-cmip7_v0_testing.yaml'

# ---- standard config for CMIP7 ----
out_path: "../results"

# this needs to be changed based on where you want to store your own data
data_path: "/home/hoegner/Projects/CMIP7/" # Annika
# data_path: "C:/Users/kikstra/IIASA/ECE.prog - Documents/Projects/CMIP7/IAM Data Processing/concordia_cmip7_v0_testing" # Jarmo

variabledefs_path: "$data_path/input/variabledefinitions/variabledefs-cmip7_noCDR.csv" # updated variabledefs-cmip7.csv and change to that file


history_path: "$data_path/input/historical"
scenario_path: "$data_path/input/scenarios"
regionmappings_path: "$data_path/input/regionmappings/f2536b68fd52a81fda792c7d3547b9a60c868041"
gridding_path: "$data_path/input/gridding"
proxy_path: "$data_path/input/gridding/proxy_rasters"
postprocess_path: "$data_path/input/postprocessing" # e.g. used in rescue for adding HFCs from pre-specified pathways 

variable_template: "CMIP7 Harmonization|Emissions|{gas}|{sector}"
base_year: 2023

regionmappings: # region mappings for all models
  MESSAGEix-GLOBIOM-GAINS 2.1-M-R12:
    path: "$regionmappings_path/region_definitions_message.csv"
    country_column: "iso"
    region_column: "message_r12"
    sep: ","
  REMIND-MAgPIE 3.5-4.10:
    path: "$regionmappings_path/region_definitions_REMIND-MAgPIE 3.5-4.10.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  AIM 3.0:
    path: "$regionmappings_path/region_definitions_AIM 3.0.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  COFFEE 1.6:
    path: "$regionmappings_path/region_definitions_COFFEE 1.6.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  # GCAM 7.1 scenarioMIP:
  #   path: "$regionmappings_path/region_definitions_GCAM 7.1.csv"
  #   country_column: "iso"
  #   region_column: "tbd"
  #   sep: ","
  # IMAGE 3.4:
  #   path: "$regionmappings_path/region_definitions_IMAGE 3.4.csv"
  #   country_column: "iso"
  #   region_column: "tbd"
  #   sep: ","
  # WITCH 6.0:
  #   path: "$regionmappings_path/region_definitions_WITCH 6.0.csv"
  #   country_column: "iso"
  #   region_column: "tbd"
  #   sep: ","


country_combinations:
  sdn_ssd: ["ssd", "sdn"]
  isr_pse: ["isr", "pse"]
  srb_ksv: ["srb", "srb (kosovo)"]

luc_sectors:
  - "Agricultural Waste Burning"
  - "Grassland Burning"
  - "Forest Burning"
  - "Peat Burning"
  - "Agriculture"
  # - "Aggregate - Agriculture and LUC"
  # - "CDR Afforestation"


encoding: # don't change
  zlib: true
  complevel: 2

ftp:
  server: "127.0.0.1"
  port: 21
  user: anonymous
  password: ""
