# region mappings for all models
# these are produced here: https://github.com/iiasa/emissions_harmonization_historical/blob/main/notebooks/5010_create-region-mapping.py
# and then stored in `regionmappings_path`
# which generally refers to a specific commit hash
regionmappings: 
  MESSAGEix-GLOBIOM-GAINS 2.1-M-R12:
    path: "$regionmappings_path/region_definitions_MESSAGEix-GLOBIOM-GAINS 2.1-R12.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  REMIND-MAgPIE 3.5-4.10:
    path: "$regionmappings_path/region_definitions_REMIND-MAgPIE 3.5-4.10.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  AIM 3.0:
    path: "$regionmappings_path/region_definitions_AIM 3.0.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  COFFEE 1.6:
    path: "$regionmappings_path/region_definitions_COFFEE 1.6.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  GCAM 7.1 scenarioMIP:
    path: "$regionmappings_path/region_definitions_GCAM 7.1.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  IMAGE 3.4:
    path: "$regionmappings_path/region_definitions_IMAGE 3.4.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","
  WITCH 6.0:
    path: "$regionmappings_path/region_definitions_WITCH 6.0.csv"
    country_column: "iso3"
    region_column: "name"
    sep: ","


