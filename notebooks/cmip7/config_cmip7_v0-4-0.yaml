variable_template: "CMIP7 Harmonization|Emissions|{gas}|{sector}"
# base_year: 2022 # actual harmonization year is 2023 - but the scenario files for BB4CMIP7 should start in 2022 (note that 2022 should be overwritten with the CEDS 2022 file)
base_year: 2023 # for first upload; don't provide the 2022 in the scenario data yet.

# region mappings for all models
# these are produced here: https://github.com/iiasa/emissions_harmonization_historical/blob/main/notebooks/5010_create-region-mapping.py
# and then stored in `regionmappings_path`
# which generally refers to a specific commit hash
regionmappings: 
  MESSAGEix-GLOBIOM-GAINS 2.1-M-R12:
    path: "$regionmappings_path/region_definitions_MESSAGEix-GLOBIOM-GAINS 2.1-R12_shnsxm.csv" # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","
  REMIND-MAgPIE 3.5-4.11:
    path: "$regionmappings_path/region_definitions_REMIND-MAgPIE 3.5-4.11.csv" # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","
  AIM 3.0:
    path: "$regionmappings_path/region_definitions_AIM 3.0_ggyimnjeyshn.csv"  # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","
  COFFEE 1.6:
    path: "$regionmappings_path/region_definitions_COFFEE 1.6.csv" # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","
  GCAM 8s:
    path: "$regionmappings_path/region_definitions_GCAM 8s.csv" # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","
  IMAGE 3.4:
    path: "$regionmappings_path/region_definitions_IMAGE 3.4_sjm.csv" # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","
  WITCH 6.0:
    path: "$regionmappings_path/region_definitions_WITCH 6.0.csv" # checked, runs through
    country_column: "iso3"
    region_column: "name"
    sep: ","


